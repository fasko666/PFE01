# ─────────────────────────────────────────────────────────────────────────────
#  PANDA — Nginx server block (production)
#
#  Two upstream proxies on the SAME hostname:
#    /                  → PHP-FPM (Laravel API + frontend static)
#    /app/              → Reverb websocket server on 127.0.0.1:8080
#
#  Drop in /etc/nginx/sites-available/panda then symlink to sites-enabled.
#  Requires a TLS cert (use certbot --nginx) — chat MUST be wss:// in prod.
# ─────────────────────────────────────────────────────────────────────────────

upstream reverb_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name panda.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name panda.example.com;

    root /var/www/panda/public;
    index index.php index.html;

    ssl_certificate     /etc/letsencrypt/live/panda.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/panda.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Hardening
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    client_max_body_size 25M;

    # ── Reverb (websockets) ──────────────────────────────────────────────────
    # Connection upgrade required for ws/wss. Long timeouts: a chat tab stays
    # open for the entire user session.
    location /app/ {
        proxy_pass http://reverb_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         "upgrade";
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_buffering off;
    }

    # ── Laravel (PHP-FPM) ────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param HTTPS on;
        fastcgi_read_timeout 60s;
    }

    location ~ /\.(?!well-known) { deny all; }
}
